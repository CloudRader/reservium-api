[project]
name = "reservium-api"
version = "2.0.0"
description = "Reservium: a ready to go reservation system"
authors = [{ name = "Artem Kuznetsov", email = "artyom.20century@gmail.com" }]
requires-python = "==3.13.0"
dependencies = [
    "fastapi==0.135.3",
    "uvicorn[standard]==0.40.0",
    "pydantic[email]==2.12.5",
    "pydantic-settings==2.12.0",
    "sqlalchemy[asyncio]==2.0.49",
    "asyncpg==0.31.0",
    "pytz==2025.2",
    "alembic==1.18.4",
    "sqlalchemy-easy-softdelete==0.8.3",
    "fastapi-mail==1.6.1",
    "itsdangerous==2.2.0",
    "requests-oauthlib==2.0.0",
    "pypdf==6.9.2",
    "httpx==0.28.1",
    "google-auth-oauthlib==1.2.4",
    "google-api-python-client==2.189.0",
    "python-dateutil==2.9.0.post0",
    "orjson==3.11.7",
    "gunicorn==23.0.0",
    "aiohttp==3.13.4",
    "python-keycloak==7.0.3",
    "jwcrypto==1.5.6",
    "authzed==1.24.2",
]

[dependency-groups]
dev = [
    "pytest==9.0.2",
    "pytest-asyncio==1.3.0",
    "pytest-cov==7.0.0",
    "pytest-env==1.6.0",
    "mypy==1.19.1",
    "testcontainers==4.14.2",
    "types-pytz==2025.2.0.20251108",
    "types-python-dateutil==2.9.0.20260402",
    "ruff==0.14.11",
]

[tool.uv]
package = false

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
