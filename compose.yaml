name: reservium

services:
  db:
    container_name: db
    image: postgres:18.4
    restart: on-failure
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: devdb
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - internal

  api:
    container_name: api
    build:
      context: ./reservation-app
      dockerfile: Dockerfile
    env_file:
      - reservation-app/.env
    environment:
      POSTGRES_SERVER: db
    depends_on:
      - db
    restart: on-failure
    volumes:
      - ./reservation-app/src:/app/src
    ports:
      - "8000:8000"
    networks:
      - internal

  ui:
    container_name: ui
    image: ghcr.io/cloudrader/reservium-ui:latest
    platform: linux/amd64
    env_file:
      - reservation-app/.env
    ports:
      - "3000:3000"
    networks:
      - internal

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:9.16
    restart: on-failure
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - internal
    depends_on:
      - db

networks:
  internal:

volumes:
  postgres_data:
