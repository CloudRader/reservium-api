[tool.mypy]
files = ["src", "tests"]
ignore_missing_imports = true
cache_dir = ".mypy_cache"
sqlite_cache = true
pretty = true
show_error_codes = true

[[tool.mypy.overrides]]
module = "src.infrastructure.database.sqlalchemy.models.soft_delete_mixin"
ignore_errors = true

[[tool.mypy.overrides]]
module = "src.api.api_base"
ignore_errors = true

[[tool.mypy.overrides]]
module = "src.api.permissions"
ignore_errors = true

[[tool.mypy.overrides]]
module = "requests"
ignore_missing_imports = true
