[pytest]
pythonpath = [ "src" ]
testpaths = ["tests"]
env =
    ORGANIZATION_NAME=Test Organisation

    DB__POSTGRES_USER=devtest
    DB__POSTGRES_PASSWORD=passtest
    DB__POSTGRES_DB=devdbtest

    MAIL__USERNAME=test.user@example.com
    MAIL__PASSWORD=email_pass_test
    MAIL__FROM_NAME=Test Reservium

    KEYCLOAK__SERVER_URL=http://keycloak.test.com
    KEYCLOAK__REALM=test.com
    KEYCLOAK__CLIENT_ID=test_keyckoak_id
    KEYCLOAK__CLIENT_SECRET=test_keyckoak_secret

    SPICEDB__SERVER_URL=http://spicedb.test.com
    SPICEDB__CLIENT_SECRET=test_spicedb_secret

    GOOGLE__PROJECT_ID=test_google_project_id
    GOOGLE__PRIVATE_KEY_ID=test_google_private_key_id
    GOOGLE__PRIVATE_KEY=test_google_private_key
    GOOGLE__CLIENT_EMAIL=test_google_client_email
    GOOGLE__CLIENT_ID=test_google_client_id
    GOOGLE__CLIENT_X509_CERT_URL=test_google_client_x509_cert_url