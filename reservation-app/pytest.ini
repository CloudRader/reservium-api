[pytest]
pythonpath = [ "src" ]
testpaths = ["tests"]
env =
    APP_ORGANIZATION_NAME=Test Organisation

    POSTGRES_USER=devtest
    POSTGRES_PASSWORD=passtest
    POSTGRES_DB=devdbtest

    MAIL_USERNAME=test.user@example.com
    MAIL_PASSWORD=email_pass_test
    MAIL_FROM_NAME=Test Reservium

    OPENID_CLIENT_NAME=openid
    OPENID_CLIENT_ID=test_openid_id
    OPENID_CLIENT_SECRET=test_openid_secret
    OPENID_AUTH_URL=http://openid.test.com/auth
    OPENID_TOKEN_URL=http://openid.test.com/token
    OPENID_METADATA_URL=http://openid.test.com/.well-known/openid-configuration

    GOOGLE_PROJECT_ID=test_google_project_id
    GOOGLE_PRIVATE_KEY_ID=test_google_private_key_id
    GOOGLE_PRIVATE_KEY=test_google_private_key
    GOOGLE_CLIENT_EMAIL=test_google_client_email
    GOOGLE_CLIENT_ID=test_google_client_id
    GOOGLE_CLIENT_X509_CERT_URL=test_google_client_x509_cert_url
