name: Test

on:
  push:

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  mypy-check:
    name: Mypy Check
    runs-on: ubuntu-latest
    container:
      image: python:3.14
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.1
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: |
            reservation-app/pyproject.toml
            reservation-app/uv.lock
          cache-suffix: "mypy"

      - name: Install dependencies
        run: uv sync --group dev
        working-directory: reservation-app

      - name: Run mypy
        run: |
          cd reservation-app
          chmod +x ./scripts/mypy.sh
          uv run ./scripts/mypy.sh

  ruff-check:
    name: Ruff Check
    runs-on: ubuntu-latest
    container:
      image: python:3.14
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.1
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: |
            reservation-app/pyproject.toml
            reservation-app/uv.lock
          cache-suffix: "ruff"

      - name: Install dependencies
        run: uv sync --group dev
        working-directory: reservation-app

      - name: Run Ruff
        run: |
          cd reservation-app
          chmod +x ./scripts/lint_ruff.sh
          uv run ./scripts/lint_ruff.sh

  pytest:
    name: Pytest with Coverage
    runs-on: ubuntu-latest
    container:
      image: python:3.14
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.1
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: |
            reservation-app/pyproject.toml
            reservation-app/uv.lock
          cache-suffix: "pytest"

      - name: Install dependencies
        run: uv sync --group dev
        working-directory: reservation-app

      - name: Run pytest with coverage
        run: |
          cd reservation-app
          chmod +x ./scripts/pytest.sh
          uv run ./scripts/pytest.sh -c -r

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: reservation-app/tests/coverage.xml
          flags: unittests
          name: reservation-api
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
