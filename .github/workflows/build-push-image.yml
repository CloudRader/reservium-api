name: Docker Build and Push

on:
  workflow_run:
    workflows: ["Create Release Notes"]
    types:
      - completed

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'release-please--branches--main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set image tags
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)

          echo "IMAGE_NAME=${{ secrets.DOCKER_HUB_USER }}/reservium-api" >> $GITHUB_ENV
          echo "VERSION_LATEST=latest" >> $GITHUB_ENV
          echo "VERSION_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE_NAME:$VERSION_LATEST -t $IMAGE_NAME:$VERSION_TAG .
          docker push $IMAGE_NAME:$VERSION_LATEST
          docker push $IMAGE_NAME:$VERSION_TAG
