name: Build and Push Images

on:
  push:
    branches:
      - develop
  workflow_run:
    workflows: ["Create Release Notes"]
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  build-dev-image:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Dev Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/reservium-api:latest-dev

          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  build-release-image:
    runs-on: ubuntu-latest
    if: >
      ${{ github.event.workflow_run.conclusion == 'success' &&
          contains(github.event.workflow_run.head_commit.message, 'release') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag
        id: tag
        run: echo "TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

      - name: Build and Push Release Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/reservium-api:latest
            ghcr.io/${{ github.repository_owner }}/reservium-api:${{ env.TAG }}

          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
