name: Build and Push Images

on:
  push:
    branches:
      - develop
  workflow_run:
    workflows: ["Create Release Notes"]
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  build-dev-image:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Dev Image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"

          docker build -t $IMAGE_NAME:latest-dev .
          docker push $IMAGE_NAME:latest-dev

  build-release-image:
    runs-on: ubuntu-latest
    if: >
      ${{ github.event.workflow_run.conclusion == 'success' &&
          contains(github.event.workflow_run.head_commit.message, 'release') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Release Image
        run: |
          TAG=$(git describe --tags --abbrev=0)
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"

          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:$TAG .
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$TAG
